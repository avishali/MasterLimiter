<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" font-family="Helvetica, Arial, sans-serif">
  <!-- ============ background ============ -->
  <rect x="0" y="0" width="1120" height="640" rx="6" fill="#13161d"/>

  <!-- ============ header ============ -->
  <rect x="0" y="0" width="1120" height="52" fill="#171b23"/>
  <text x="24" y="33" fill="#38c5d8" font-size="20" font-weight="700">MasterLimiter</text>
  <text x="188" y="33" fill="#5b6472" font-size="12">v0.2 · Maximizer</text>
  <text x="980" y="33" fill="#5b6472" font-size="13">Presets  ◀  ▶</text>

  <!-- legend -->
  <rect x="772" y="14" width="14" height="14" rx="3" fill="#232a35" stroke="#39414e"/>
  <text x="792" y="25" fill="#717a88" font-size="11">existing</text>
  <rect x="862" y="14" width="14" height="14" rx="3" fill="none" stroke="#38c5d8" stroke-dasharray="3 2"/>
  <text x="882" y="25" fill="#38c5d8" font-size="11">NEW (placeholder)</text>

  <!-- ============ MAXIMIZER panel ============ -->
  <rect x="16" y="64" width="752" height="500" rx="10" fill="#1b2029" stroke="#2a313d"/>
  <text x="34" y="92" fill="#717a88" font-size="13" letter-spacing="2">MAXIMIZER</text>

  <!-- big Gain (drive) knob — positive-only, 0.0 dB at hard-left minimum, push UP -->
  <circle cx="118" cy="186" r="58" fill="#232a35" stroke="#39414e" stroke-width="2"/>
  <!-- travel track: empty at minimum (no fill) -->
  <circle cx="118" cy="186" r="58" fill="none" stroke="#2f3744" stroke-width="3" stroke-dasharray="270 94" transform="rotate(135 118 186)"/>
  <!-- pointer parked at far-left / minimum (0.0 dB) -->
  <line x1="118" y1="186" x2="77" y2="227" stroke="#38c5d8" stroke-width="3" stroke-linecap="round"/>
  <!-- min / max ticks -->
  <text x="60" y="248" fill="#5b6472" font-size="10" text-anchor="middle">0</text>
  <text x="176" y="248" fill="#5b6472" font-size="10" text-anchor="middle">+24</text>
  <!-- push-up direction hint -->
  <path d="M 150 142 A 50 50 0 0 1 168 178" fill="none" stroke="#38c5d8" stroke-width="1.5" opacity="0.7"/>
  <polygon points="168,178 162,170 172,168" fill="#38c5d8" opacity="0.7"/>
  <text x="118" y="192" fill="#e7ebf1" font-size="18" font-weight="700" text-anchor="middle">0.0 dB</text>
  <text x="118" y="266" fill="#cdd3dc" font-size="15" text-anchor="middle" font-weight="600">Gain</text>
  <text x="118" y="283" fill="#5b6472" font-size="11" text-anchor="middle">drive · 0 → +24, push up</text>

  <!-- Gain <-> Ceiling link (gain match method 2) -->
  <path d="M 196 186 H 268" stroke="#38c5d8" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <rect x="210" y="158" width="44" height="22" rx="11" fill="#15323a" stroke="#38c5d8" stroke-dasharray="3 2"/>
  <text x="232" y="173" fill="#38c5d8" font-size="11" text-anchor="middle">⇄ link</text>
  <text x="232" y="146" fill="#38c5d8" font-size="9" text-anchor="middle">NEW</text>

  <!-- Output Level + True Peak -->
  <text x="300" y="140" fill="#cdd3dc" font-size="14" font-weight="600">Output Level</text>
  <rect x="300" y="150" width="128" height="46" rx="6" fill="#232a35" stroke="#39414e"/>
  <text x="364" y="180" fill="#e7ebf1" font-size="18" font-weight="700" text-anchor="middle">−1.00 dB</text>
  <circle cx="312" cy="218" r="6" fill="#e0b341"/>
  <text x="326" y="222" fill="#cdd3dc" font-size="13">True Peak</text>
  <text x="300" y="246" fill="#5b6472" font-size="11">= the ceiling (sacred unless Output trim boosts)</text>

  <!-- Character slider -->
  <text x="34" y="312" fill="#cdd3dc" font-size="14" font-weight="600">Character</text>
  <rect x="34" y="324" width="400" height="6" rx="3" fill="#2a313d"/>
  <circle cx="120" cy="327" r="9" fill="#38c5d8"/>
  <text x="34" y="352" fill="#5b6472" font-size="11">Clean</text>
  <text x="400" y="352" fill="#5b6472" font-size="11" text-anchor="end">Fast &amp; Loud</text>

  <!-- knob row: Release / Ratio / Lookahead / Auto / Stereo / M-S -->
  <g fill="#cdd3dc" font-size="11" text-anchor="middle">
    <!-- Release -->
    <circle cx="80" cy="408" r="26" fill="#232a35" stroke="#39414e"/><line x1="80" y1="408" x2="64" y2="392" stroke="#9aa3b1" stroke-width="2" stroke-linecap="round"/>
    <text x="80" y="452">Release</text>
    <!-- Sustain Ratio -->
    <circle cx="172" cy="408" r="26" fill="#232a35" stroke="#39414e"/><line x1="172" y1="408" x2="156" y2="392" stroke="#9aa3b1" stroke-width="2" stroke-linecap="round"/>
    <text x="172" y="452">Sustain</text>
    <!-- Lookahead -->
    <circle cx="264" cy="408" r="26" fill="#232a35" stroke="#39414e"/><line x1="264" y1="408" x2="248" y2="392" stroke="#9aa3b1" stroke-width="2" stroke-linecap="round"/>
    <text x="264" y="452">Lookahead</text>
    <!-- Stereo Link -->
    <circle cx="356" cy="408" r="26" fill="#232a35" stroke="#39414e"/><line x1="356" y1="408" x2="340" y2="392" stroke="#9aa3b1" stroke-width="2" stroke-linecap="round"/>
    <text x="356" y="452">Stereo Lk</text>
    <!-- M/S Link -->
    <circle cx="448" cy="408" r="26" fill="#232a35" stroke="#39414e"/><line x1="448" y1="408" x2="432" y2="392" stroke="#9aa3b1" stroke-width="2" stroke-linecap="round"/>
    <text x="448" y="452">M/S Lk</text>
  </g>
  <!-- Release Auto toggle -->
  <rect x="512" y="394" width="74" height="28" rx="14" fill="#232a35" stroke="#39414e"/>
  <text x="549" y="412" fill="#cdd3dc" font-size="12" text-anchor="middle">Auto Rel</text>

  <!-- Gain Match: Auto/Track (method 1) -->
  <text x="34" y="498" fill="#717a88" font-size="12" letter-spacing="1">GAIN MATCH</text>
  <rect x="34" y="508" width="120" height="32" rx="16" fill="#15323a" stroke="#38c5d8" stroke-dasharray="3 2"/>
  <text x="94" y="528" fill="#38c5d8" font-size="12" text-anchor="middle">Auto / Track</text>
  <text x="170" y="528" fill="#5b6472" font-size="11">measured LUFS match (continuous)</text>
  <text x="150" y="500" fill="#38c5d8" font-size="9">NEW</text>

  <!-- GR meter (vertical, top-down) inside maximizer -->
  <text x="706" y="104" fill="#717a88" font-size="11" text-anchor="middle">GR</text>
  <rect x="688" y="112" width="40" height="320" rx="5" fill="#10131a" stroke="#2a313d"/>
  <rect x="690" y="114" width="36" height="120" rx="4" fill="#c0552e" opacity="0.8"/>
  <text x="706" y="448" fill="#9aa3b1" font-size="11" text-anchor="middle">3.2 dB</text>

  <!-- ============ I/O panel ============ -->
  <rect x="784" y="64" width="320" height="500" rx="10" fill="#1b2029" stroke="#2a313d"/>
  <text x="802" y="92" fill="#717a88" font-size="13" letter-spacing="2">I/O</text>

  <!-- Learn Input Gain -->
  <rect x="802" y="104" width="284" height="34" rx="8" fill="#15323a" stroke="#38c5d8" stroke-dasharray="3 2"/>
  <text x="816" y="126" fill="#38c5d8" font-size="13">Learn Input Gain</text>
  <text x="1072" y="126" fill="#e7ebf1" font-size="13" text-anchor="end" font-weight="600">−11.0 LUFS</text>
  <text x="1086" y="100" fill="#38c5d8" font-size="9" text-anchor="end">NEW</text>

  <!-- dB scale -->
  <g fill="#5b6472" font-size="10" text-anchor="end">
    <text x="1080" y="172">0</text><text x="1080" y="224">−6</text><text x="1080" y="286">−12</text>
    <text x="1080" y="356">−24</text><text x="1080" y="430">−36</text><text x="1080" y="486">−50</text>
  </g>

  <!-- meter bars: In L, In R, Out L, Out R -->
  <g>
    <rect x="828" y="160" width="26" height="330" rx="4" fill="#10131a" stroke="#2a313d"/>
    <rect x="828" y="300" width="26" height="190" rx="4" fill="#38c5d8" opacity="0.55"/>
    <rect x="858" y="160" width="26" height="330" rx="4" fill="#10131a" stroke="#2a313d"/>
    <rect x="858" y="320" width="26" height="170" rx="4" fill="#38c5d8" opacity="0.55"/>
    <rect x="940" y="160" width="26" height="330" rx="4" fill="#10131a" stroke="#2a313d"/>
    <rect x="940" y="290" width="26" height="200" rx="4" fill="#5cc98a" opacity="0.6"/>
    <rect x="970" y="160" width="26" height="330" rx="4" fill="#10131a" stroke="#2a313d"/>
    <rect x="970" y="300" width="26" height="190" rx="4" fill="#5cc98a" opacity="0.6"/>
  </g>

  <!-- INPUT gain fader handle (NEW) -->
  <rect x="822" y="296" width="68" height="12" rx="3" fill="#38c5d8"/>
  <text x="856" y="150" fill="#cdd3dc" font-size="12" text-anchor="middle" font-weight="600">INPUT</text>
  <rect x="820" y="500" width="72" height="22" rx="6" fill="#15323a" stroke="#38c5d8" stroke-dasharray="3 2"/>
  <text x="856" y="515" fill="#38c5d8" font-size="12" text-anchor="middle">0.0 dB</text>

  <!-- OUTPUT gain fader handle (NEW) -->
  <rect x="934" y="286" width="68" height="12" rx="3" fill="#5cc98a"/>
  <text x="968" y="150" fill="#cdd3dc" font-size="12" text-anchor="middle" font-weight="600">OUTPUT</text>
  <rect x="932" y="500" width="72" height="22" rx="6" fill="#15323a" stroke="#38c5d8" stroke-dasharray="3 2"/>
  <text x="968" y="515" fill="#38c5d8" font-size="12" text-anchor="middle">0.0 dB</text>

  <!-- independent trims note -->
  <text x="944" y="546" fill="#5b6472" font-size="10" text-anchor="middle">independent trims</text>

  <!-- ============ footer ============ -->
  <rect x="24" y="586" width="92" height="34" rx="8" fill="#232a35" stroke="#39414e"/>
  <text x="70" y="608" fill="#cdd3dc" font-size="13" text-anchor="middle">Bypass</text>
  <text x="1096" y="608" fill="#5b6472" font-size="11" text-anchor="end">In peak −Inf · Out peak −Inf · TP −Inf (post Output)</text>
</svg>
